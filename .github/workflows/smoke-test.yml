name: Smoke Test
on:
  pull_request:
  workflow_dispatch:
jobs:
  lint-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          test -f AGENTS.md
          test -f requirements.txt
          test -f main.py
          test -d agents
          test -d knowledge
          test -d tasks
